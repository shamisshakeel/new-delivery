<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AHRP POS TERMINAL</title>
    <style>
        /* CSS STYLES */
        body { font-family: sans-serif; margin: 20px; }
        .tabs-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; }
        .tab-btn.active { background: #007bff; color: white; border: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div class="tabs-nav">
        <button class="tab-btn active" onclick="switchView('pos-tab')">Point of Sale</button>
        <button class="tab-btn" onclick="switchView('history-tab')">Archive Ledger</button>
    </div>

    <div id="pos-tab" class="tab-content active">
        <h2>Point of Sale</h2>
        <p>POS interface will load here.</p>
    </div>
    
    <div id="history-tab" class="tab-content">
        <h2>Archive Ledger</h2>
        <p>History will load here.</p>
    </div>

    <script>
        // JAVASCRIPT LOGIC
        function switchView(tabId) {
            // Hide all sections
            document.querySelectorAll('.tab-content').forEach(section => {
                section.classList.remove('active');
            });
            // Remove active class from buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected section
            document.getElementById(tabId).classList.add('active');
            
            // Set active button
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
